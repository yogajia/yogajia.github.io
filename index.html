<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>WELCOME</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background-color: #f5f5f0;
            color: #000;
            overflow-x: hidden;
        }

        /* 顶部导航 */
        .top-nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: #f5f5f0;
            padding: 20px 0;
            text-align: center;
            z-index: 100;
            border-bottom: 2px solid #000;
        }

        .nav-buttons {
            display: inline-flex;
            gap: 15px;
        }

        .nav-btn {
            padding: 10px 30px;
            border: 2px solid #000;
            border-radius: 25px;
            background: transparent;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            color: #000;
            display: inline-block;
        }

        .nav-btn:hover {
            background: #000;
            color: #f5f5f0;
        }

        /* 主容器 */
        .container {
            margin-top: 80px;
            padding: 40px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        /* 头部标题 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 60px;
            border-bottom: 3px solid #000;
            padding-bottom: 5px;
        }

        .logo {
            font-size: 100px;
            font-weight: bold;
            line-height: 0.8;
            letter-spacing: -5px;
            font-family: 'Comic Sans MS';
        }

        .year {
            font-size: 100px;
            font-weight: bold;
            line-height: 0.8;
            letter-spacing: 5px;
            font-family: 'Comic Sans MS';
        }

        .subtitle {
            margin-top: 10px;
            font-size: 24px;
            letter-spacing: 2px;
            font-family: Papyrus;
        }

        .copyright {
            text-align: right;
            font-size: 24px;
            margin-top: 10px;
            font-family: Papyrus;
        }

        /* 主要内容区 */
        .main-content {
            position: relative;
            min-height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 60px 0;
        }

        /* 荧光黄背景文字 */
        .yellow-text {
            position: fixed;
            bottom: 80px;
            width: 100%;
            text-align: center;
            left: 50%;
            transform: translateX(-50%);
            font-size: 180px;
            font-weight: bold;
            color: #d4ff00;
            opacity: 0.9;
            z-index: 1;
            letter-spacing: -10px;
            line-height: 0.9;
            user-select: none;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.1);
        }


        /* 卡片容器 */
        .card-container {
            position: relative;
            z-index: 10;
            perspective: 1000px;
        }

        .profile-card {
            width: 600px;
            height: 380px;
            background: linear-gradient(135deg, #b8b8b8 0%, #d0d0d0 100%);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: transform 0.3s;
            position: relative;
            overflow: hidden;
        }

        .profile-card:hover {
            transform: translateY(-10px) rotateY(5deg);
        }

        .card-text {
            flex: 1;
            padding-right: 30px;
        }

        .card-name {
            font-size: 72px;
            font-weight: bold;
            line-height: 0.9;
            margin-bottom: 20px;
        }

        .card-info {
            font-size: 15px;
            line-height: 3.2;
            margin-bottom: 10px;
        }

        .profile-image {
            width: 200px;
            height: 200px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .profile-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 侧边装饰 */
        .side-decoration {
            position: absolute;
            font-size: 32px;
            font-weight: bold;
            transform: rotate(-90deg);
            left: 10px;
            top: 50%;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* 滚动文字 */
        .scroll-text {
            position: fixed;
            bottom: 40px;
            left: 45%;
            text-align: center;
            padding: center;
            font-size: 18px;
            letter-spacing: 3px;
            z-index: 100;
            animation: fadeInOut 3s infinite;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .logo, .year {
                font-size: 60px;
            }

            .side-decoration{
                display: none;
            }

            .subtitle, .copyright {
                font-size: 16px;
            }

            .yellow-text {
                font-size: 80px;
            }

            .profile-card {
                width: 90%;
                height: auto;
                flex-direction: column;
                padding: 30px;
            }

            .card-name {
                font-size: 48px;
            }

            .profile-image {
                width: 100%;
                height: 300px;
                margin-top: 20px;
            }

            .scroll-text{
                display: none;
            }

        }

        @media(max-height: 500px){
            .yellow-text{
                display: none;
            }

            .scroll-text{
                display: none;
            }
        }
    </style>
</head>

<body>
<!-- 顶部导航 -->
<nav class="top-nav">
    <div class="nav-buttons">
        <a href="/archives/" class="nav-btn">BLOG</a>
        <a href="/gallery/" class="nav-btn">PHOTO</a>
        <a href="/reading/" class="nav-btn">READING</a>
        <a href="/about/" class="nav-btn">ABOUT ME</a>
    </div>
</nav>

<!-- 主容器 -->
<div class="container">
    <!-- 头部 -->
    <header class="header">
        <div>
            <div class="logo">MYBLOG</div>
            <!--            <hr/>-->
            <div class="subtitle">WELCOME TO</div>
        </div>
        <div>
            <div class="year" id="yearCopyrighted"></div>
            <!--            <hr/>-->
            <div class="copyright">COPYRIGHTED ©</div>
        </div>
    </header>

    <!-- 主内容 -->
    <div class="main-content">
        <!-- 装饰文字 -->
        <div class="side-decoration" id="dateDisplay"></div>

        <!-- 个人卡片 -->
        <div class="card-container">
            <div class="profile-card">
                <div class="card-text">
                    <div class="card-name">yojia</div>
                    <div class="card-info">
                        这是想写一段话<br>
                        BUT，，，还没想要写哪些宏大叙事<br>
                        让我好好考虑下🤔
                    </div>
                </div>
                <div class="profile-image">
                    <!-- 照片 -->
                    <img src="/assets/img/thinking.jpg" alt="Profile Photo">
                </div>
            </div>
        </div>

        <!-- 荧光黄背景文字 -->
        <div class="yellow-text">HAPPY DAY!</div>
    </div>
</div>
  
<script>
    // 平滑滚动
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener('click', function (e) {
            e.preventDefault();
            const target = document.querySelector(this.getAttribute('href'));
            if (target) {
                target.scrollIntoView({ behavior: 'smooth' });
            }
        });
    });

    // 卡片视差效果
    const card = document.querySelector('.profile-card');
    document.addEventListener('mousemove', (e) => {
        const x = (window.innerWidth / 2 - e.clientX) / 50;
        const y = (window.innerHeight / 2 - e.clientY) / 50;
        card.style.transform = `translateY(-10px) rotateY(${x}deg) rotateX(${y}deg)`;
    });

    // 获取当前日期并格式化
    function getCurrentDate() {
        const now = new Date();
        const month = (now.getMonth() + 1).toString().padStart(2, '0');
        const day = now.getDate().toString().padStart(2, '0');
        return `${month}-${day}`;
    }

    // 更新侧边日期显示
    function updateDateDisplay() {
        const dateDisplay = document.getElementById('dateDisplay');
        const currentDate = getCurrentDate();

        dateDisplay.textContent = currentDate;

        //获取年份
        const now = new Date();
        const year = now.getFullYear().toString().padStart(2, '0');
        const yearDisplay = document.getElementById('yearCopyrighted');

        yearDisplay.textContent = year;
    }

    // 页面加载时更新日期
    document.addEventListener('DOMContentLoaded', updateDateDisplay);
</script>
</body>
</html>
