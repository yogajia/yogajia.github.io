<!-- ===== Global BGM ===== -->
<div class="bgm-control paused" id="bgmControl">
  <svg id="playIcon" viewBox="0 0 24 24">
    <path d="M8 5v14l11-7z"/>
  </svg>
  <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none;">
    <path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/>
  </svg>
</div>

<audio id="bgm" loop preload="auto">
  <source src="/assets/music/beihai.mp3" type="audio/mpeg">
</audio>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const bgm = document.getElementById("bgm");
  const bgmControl = document.getElementById("bgmControl");
  const playIcon = document.getElementById("playIcon");
  const pauseIcon = document.getElementById("pauseIcon");

  if (!bgm || !bgmControl) return;

  let isPlaying = localStorage.getItem("bgmPlaying") === "true";

  function updateUI() {
    if (isPlaying) {
      playIcon.style.display = "none";
      pauseIcon.style.display = "block";
      bgmControl.classList.remove("paused");
    } else {
      playIcon.style.display = "block";
      pauseIcon.style.display = "none";
      bgmControl.classList.add("paused");
    }
  }

  if (isPlaying) {
    bgm.play().catch(() => {});
  }
  updateUI();

  bgmControl.addEventListener("click", () => {
    if (bgm.paused) {
      bgm.play();
      isPlaying = true;
    } else {
      bgm.pause();
      isPlaying = false;
    }
    localStorage.setItem("bgmPlaying", isPlaying);
    updateUI();
  });
});
</script>
