<div class="bgm-control paused" id="bgmControl">
  <svg id="playIcon" viewBox="0 0 24 24">
    <path d="M8 5v14l11-7z"/>
  </svg>
  <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none;">
    <path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/>
  </svg>
</div>

<audio id="bgm" loop>
  <source src="/assets/music/beihai.mp3" type="audio/mpeg">
</audio>

<script>
  const bgm = document.getElementById("bgm");
  const btn = document.getElementById("bgmControl");
  const play = document.getElementById("playIcon");
  const pause = document.getElementById("pauseIcon");

  let playing = localStorage.getItem("bgm") === "on";

  function update() {
    if (playing) {
      play.style.display = "none";
      pause.style.display = "block";
      btn.classList.remove("paused");
    } else {
      play.style.display = "block";
      pause.style.display = "none";
      btn.classList.add("paused");
    }
  }

  if (playing) bgm.play().catch(()=>{});
  update();

  btn.onclick = () => {
    if (bgm.paused) {
      bgm.play();
      playing = true;
    } else {
      bgm.pause();
      playing = false;
    }
    localStorage.setItem("bgm", playing ? "on" : "off");
    update();
  };
</script>
