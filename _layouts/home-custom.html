---
layout: none
---

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>{{ site.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- 复用 Chirpy 的样式 -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

</head>
  
<body>
<div id="home">
  <!-- 顶部导航 -->
<nav class="top-nav">
    <div class="nav-buttons">
        <a href="" class="nav-btn">BLOGS</a>
        <a href="" class="nav-btn">READING</a>
        <a href="" class="nav-btn">PHOTO</a>
        <a href="" class="nav-btn">ABOUT ME</a>
    </div>
</nav>

<!-- 主容器 -->
<div class="container">
    <!-- 头部 -->
    <header class="header">
        <div>
            <div class="logo">MYBLOG</div>
            <!--            <hr/>-->
            <div class="subtitle">WELCOME TO</div>
        </div>
        <div>
            <div class="year" id="yearCopyrighted"></div>
            <!--            <hr/>-->
            <div class="copyright">COPYRIGHTED ©</div>
        </div>
    </header>

    <!-- 主内容 -->
    <div class="main-content">
        <!-- 装饰文字 -->
        <div class="side-decoration" id="dateDisplay"></div>

        <!-- 个人卡片 -->
        <div class="card-container">
            <div class="profile-card">
                <div class="card-text">
                    <div class="card-name">yojia</div>
                    <div class="card-info">
                        这是想写一段话<br>
                        BUT，，，还没想要写哪些宏大叙事<br>
                        让我好好考虑下🤔
                    </div>
                </div>
                <div class="profile-image">
                    <!-- 照片 -->
                    <img src="/assets/img/thinking.jpg" alt="Profile Photo">
                </div>
            </div>
        </div>

        <!-- 荧光黄背景文字 -->
        <div class="yellow-text">HAPPY DAY!</div>
    </div>

</div>

<!-- 底部状态 -->
<div class="status-badge">
    <span class="status-dot"></span>
    留言
</div>

<!--&lt;!&ndash; 滚动提示&ndash;&gt;-->
<!--<div class="scroll-text">向下滚动 @ 探索更多...</div>-->

<!-- BGM控制 -->
<div class="bgm-control" id="bgmControl">
    <svg id="playIcon" viewBox="0 0 24 24">
        <path d="M8 5v14l11-7z"/>
    </svg>
    <svg id="pauseIcon" viewBox="0 0 24 24" style="display: none;">
        <path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/>
    </svg>
</div>

<!-- BGM音频 -->
<audio id="bgm" loop>
    <source src="/assets/music/beihai.mp3" type="audio/mpeg">
</audio>

<script>
    // BGM控制
    const bgm = document.getElementById('bgm');
    const bgmControl = document.getElementById('bgmControl');
    const playIcon = document.getElementById('playIcon');
    const pauseIcon = document.getElementById('pauseIcon');
    let isPlaying = false;

    function updateBGMButton() {
        if (isPlaying) {
            playIcon.style.display = 'none';
            pauseIcon.style.display = 'block';
            bgmControl.classList.remove('paused');
        } else {
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
            bgmControl.classList.add('paused');
        }
    }

    bgmControl.addEventListener('click', () => {
        if (isPlaying) {
            bgm.pause();
            isPlaying = false;
        } else {
            bgm.play();
            isPlaying = true;
        }
        updateBGMButton();
    });

    // 自动播放
    window.addEventListener('load', () => {
        bgm.play().then(() => {
            isPlaying = true;
            updateBGMButton();
        }).catch(() => {
            console.log('等待用户交互');
        });
    });

    // 用户交互后播放
    document.addEventListener('click', function playOnce() {
        if (!isPlaying) {
            bgm.play();
            isPlaying = true;
            updateBGMButton();
        }
    }, { once: true });

    // 平滑滚动
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener('click', function (e) {
            e.preventDefault();
            const target = document.querySelector(this.getAttribute('href'));
            if (target) {
                target.scrollIntoView({ behavior: 'smooth' });
            }
        });
    });

    // 卡片视差效果
    const card = document.querySelector('.profile-card');
    document.addEventListener('mousemove', (e) => {
        const x = (window.innerWidth / 2 - e.clientX) / 50;
        const y = (window.innerHeight / 2 - e.clientY) / 50;
        card.style.transform = `translateY(-10px) rotateY(${x}deg) rotateX(${y}deg)`;
    });

    // 获取当前日期并格式化
    function getCurrentDate() {
        const now = new Date();
        const month = (now.getMonth() + 1).toString().padStart(2, '0');
        const day = now.getDate().toString().padStart(2, '0');
        return `${month}-${day}`;
    }

    // 更新侧边日期显示
    function updateDateDisplay() {
        const dateDisplay = document.getElementById('dateDisplay');
        const currentDate = getCurrentDate();

        dateDisplay.textContent = currentDate;

        //获取年份
        const now = new Date();
        const year = now.getFullYear().toString().padStart(2, '0');
        const yearDisplay = document.getElementById('yearCopyrighted');

        yearDisplay.textContent = year;
    }

    // 页面加载时更新日期
    document.addEventListener('DOMContentLoaded', updateDateDisplay);
</script>
</div>

</body>
</html>
