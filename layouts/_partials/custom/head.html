<div id="aplayer"></div>
<script>

  container: document.getElementById('aplayer'),
  fixed: true,

  loop: 'all',

    {
      name: '歌曲名1',
      artist: '歌手名',
      url: '/music/song1.mp3',
      cover: '/music/cover.jpg'
    }
  ]
});
</script>
